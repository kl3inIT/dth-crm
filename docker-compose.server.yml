# ============================================================================
# DTH CRM — Server deployment (jar-on-disk mode)
# ----------------------------------------------------------------------------
# Runs the bootJar directly inside an Eclipse Temurin JRE container — no
# custom image needed. You drop `dth-crm.jar` next to this file and everything
# else is env-driven from `.env`.
#
# Layout on server:
#   /opt/dth-crm/
#     ├─ docker-compose.server.yml
#     ├─ .env                    (copy from .env.server.example, fill secrets)
#     └─ dth-crm.jar             (scp from your build host)
#
# First boot (BUNDLED DB):
#   docker compose -f docker-compose.server.yml --profile bundled-db --env-file .env up -d
#
# First boot (EXTERNAL DB — set MAIN_DATASOURCE_URL + AGENTSTORE_DATASOURCE_URL in .env):
#   docker compose -f docker-compose.server.yml --env-file .env up -d
#
# Upgrade (replace jar, restart app only):
#   scp dth-crm.jar server:/opt/dth-crm/dth-crm.jar
#   docker compose -f docker-compose.server.yml --env-file .env up -d --force-recreate app
# ============================================================================

services:
  app:
    image: eclipse-temurin:21.0.3_9-jre-jammy
    container_name: dthcrm-app
    restart: unless-stopped
    working_dir: /app

    depends_on:
      db-main:
        condition: service_healthy
        required: false
      db-agentstore:
        condition: service_healthy
        required: false

    # =====================================================================
    # Override ANY of these in .env. Defaults match docker-compose.server.yml
    # bundled-db mode out of the box, so most installs only need to set the
    # three :? required keys (passwords + OPENROUTER_API_KEY).
    # =====================================================================
    environment:
      # ---- main store ----
      MAIN_DATASOURCE_URL: ${MAIN_DATASOURCE_URL:-jdbc:postgresql://db-main:5432/dthcrm}
      MAIN_DATASOURCE_USERNAME: ${MAIN_DATASOURCE_USERNAME:-postgres}
      MAIN_DATASOURCE_PASSWORD: ${MAIN_DATASOURCE_PASSWORD:?MAIN_DATASOURCE_PASSWORD is required}

      # ---- agentstore (Postgres + pgvector REQUIRED) ----
      AGENTSTORE_DATASOURCE_URL: ${AGENTSTORE_DATASOURCE_URL:-jdbc:postgresql://db-agentstore:5432/agentstore}
      AGENTSTORE_DATASOURCE_USERNAME: ${AGENTSTORE_DATASOURCE_USERNAME:-postgres}
      AGENTSTORE_DATASOURCE_PASSWORD: ${AGENTSTORE_DATASOURCE_PASSWORD:?AGENTSTORE_DATASOURCE_PASSWORD is required}

      # ---- AI provider ----
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3.6-35b-a3b}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-qwen/qwen3-embedding-4b}
      OPENROUTER_EMBEDDING_DIMENSIONS: ${OPENROUTER_EMBEDDING_DIMENSIONS:-2000}

      # ---- runtime ----
      DTH_ACTIVE_PROFILE: ${DTH_ACTIVE_PROFILE:-prod}
      DTH_SERVER_PORT: 8080

      # JVM heap as percentage of cgroup limit. Override JVM_MAX_RAM_PERCENT or
      # add custom args via JAVA_OPTS.
      JAVA_TOOL_OPTIONS: >-
        -XX:MaxRAMPercentage=${JVM_MAX_RAM_PERCENT:-75}
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/heapdumps
        ${JAVA_OPTS:-}

    ports:
      - "${APP_PORT:-8080}:8080"

    volumes:
      # The jar you scp'd onto the host — read-only mount.
      - ./dth-crm.jar:/app/app.jar:ro
      # Persistent state (file uploads, heapdumps).
      - dthcrm-file-storage:/app/file-storage
      - dthcrm-heapdumps:/app/heapdumps

    command: ["java", "-jar", "/app/app.jar"]

    # Bash built-in TCP probe — temurin JRE image has bash but not curl/wget.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Bundled databases — only start with `--profile bundled-db`.
  # Skip these and point MAIN_DATASOURCE_URL / AGENTSTORE_DATASOURCE_URL at
  # your managed Postgres if you have one.
  # --------------------------------------------------------------------------
  db-main:
    image: postgres:16
    container_name: dthcrm-db-main
    restart: unless-stopped
    profiles: ["bundled-db"]
    environment:
      POSTGRES_DB: ${MAIN_DB_NAME:-dthcrm}
      POSTGRES_USER: ${MAIN_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${MAIN_DATASOURCE_PASSWORD}
    volumes:
      - dthcrm-db-main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIN_DATASOURCE_USERNAME:-postgres} -d ${MAIN_DB_NAME:-dthcrm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-agentstore:
    image: pgvector/pgvector:pg16
    container_name: dthcrm-db-agentstore
    restart: unless-stopped
    profiles: ["bundled-db"]
    environment:
      POSTGRES_DB: ${AGENTSTORE_DB_NAME:-agentstore}
      POSTGRES_USER: ${AGENTSTORE_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AGENTSTORE_DATASOURCE_PASSWORD}
    volumes:
      - dthcrm-db-agentstore:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGENTSTORE_DATASOURCE_USERNAME:-postgres} -d ${AGENTSTORE_DB_NAME:-agentstore}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dthcrm-file-storage:
  dthcrm-heapdumps:
  dthcrm-db-main:
  dthcrm-db-agentstore:
