# ============================================================================
# DTH CRM — Server deployment compose
# ----------------------------------------------------------------------------
# Pulls a published image from GitHub Container Registry and reads ALL settings
# from environment variables (or a sibling `.env`). Two run modes via Docker
# Compose profiles:
#
#   1) BUNDLED MODE (default — also runs Postgres + pgvector here on the host):
#      docker compose -f docker-compose.server.yml --profile bundled-db --env-file .env up -d
#
#   2) EXTERNAL DB MODE (you already have managed Postgres + pgvector):
#      docker compose -f docker-compose.server.yml --env-file .env up -d
#
# First-time bootstrap on a fresh Ubuntu host:
#
#   sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2
#   sudo usermod -aG docker $USER && newgrp docker
#   mkdir -p /opt/dth-crm && cd /opt/dth-crm
#   curl -L -o docker-compose.server.yml \
#     https://raw.githubusercontent.com/kl3inIT/dth-crm/main/docker-compose.server.yml
#   curl -L -o .env.example \
#     https://raw.githubusercontent.com/kl3inIT/dth-crm/main/.env.server.example
#   cp .env.example .env && nano .env       # fill secrets
#   # If image is private — log in once:
#   echo "<GHCR_TOKEN>" | docker login ghcr.io -u <github-user> --password-stdin
#   docker compose -f docker-compose.server.yml --profile bundled-db --env-file .env up -d
#
# Upgrade to a new release:
#   IMAGE_TAG=v1.2.3 docker compose -f docker-compose.server.yml --env-file .env pull app
#   IMAGE_TAG=v1.2.3 docker compose -f docker-compose.server.yml --env-file .env up -d app
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # App — image pulled from GHCR. Override IMAGE_TAG in .env to pin a release.
  # --------------------------------------------------------------------------
  app:
    image: ghcr.io/kl3init/dth-crm:${IMAGE_TAG:-latest}
    container_name: dthcrm-app
    restart: unless-stopped
    pull_policy: always

    # In bundled-db mode the local Postgres containers must be healthy first.
    # In external mode these depends_on lines are no-ops (services aren't started).
    depends_on:
      db-main:
        condition: service_healthy
        required: false
      db-agentstore:
        condition: service_healthy
        required: false

    environment:
      # ---- main store ----
      MAIN_DATASOURCE_URL: ${MAIN_DATASOURCE_URL:-jdbc:postgresql://db-main:5432/dthcrm}
      MAIN_DATASOURCE_USERNAME: ${MAIN_DATASOURCE_USERNAME:-postgres}
      MAIN_DATASOURCE_PASSWORD: ${MAIN_DATASOURCE_PASSWORD:?MAIN_DATASOURCE_PASSWORD is required}

      # ---- agentstore (requires pgvector) ----
      AGENTSTORE_DATASOURCE_URL: ${AGENTSTORE_DATASOURCE_URL:-jdbc:postgresql://db-agentstore:5432/agentstore}
      AGENTSTORE_DATASOURCE_USERNAME: ${AGENTSTORE_DATASOURCE_USERNAME:-postgres}
      AGENTSTORE_DATASOURCE_PASSWORD: ${AGENTSTORE_DATASOURCE_PASSWORD:?AGENTSTORE_DATASOURCE_PASSWORD is required}

      # ---- AI provider (OpenRouter) ----
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3.6-35b-a3b}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-qwen/qwen3-embedding-4b}
      OPENROUTER_EMBEDDING_DIMENSIONS: ${OPENROUTER_EMBEDDING_DIMENSIONS:-2000}

      # ---- runtime profile ----
      DTH_ACTIVE_PROFILE: ${DTH_ACTIVE_PROFILE:-prod}
      # JVM tuning — set MaxRAMPercentage instead of -Xmx so it scales with cgroup mem
      JAVA_TOOL_OPTIONS: >-
        -XX:MaxRAMPercentage=${JVM_MAX_RAM_PERCENT:-75}
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/heapdumps

    ports:
      - "${APP_PORT:-8080}:8080"

    volumes:
      - dthcrm-file-storage:/app/file-storage
      - dthcrm-heapdumps:/app/heapdumps

    # Image has a HEALTHCHECK baked in; this just bumps the start grace period
    # since cold boot + Liquibase migrations can take ~60s on first launch.
    healthcheck:
      start_period: 180s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Bundled main DB — only starts when --profile bundled-db is passed.
  # Skip these two services entirely if you have managed Postgres.
  # --------------------------------------------------------------------------
  db-main:
    image: postgres:16
    container_name: dthcrm-db-main
    restart: unless-stopped
    profiles: ["bundled-db"]
    environment:
      POSTGRES_DB: ${MAIN_DB_NAME:-dthcrm}
      POSTGRES_USER: ${MAIN_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${MAIN_DATASOURCE_PASSWORD}
    volumes:
      - dthcrm-db-main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIN_DATASOURCE_USERNAME:-postgres} -d ${MAIN_DB_NAME:-dthcrm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-agentstore:
    image: pgvector/pgvector:pg16
    container_name: dthcrm-db-agentstore
    restart: unless-stopped
    profiles: ["bundled-db"]
    environment:
      POSTGRES_DB: ${AGENTSTORE_DB_NAME:-agentstore}
      POSTGRES_USER: ${AGENTSTORE_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AGENTSTORE_DATASOURCE_PASSWORD}
    volumes:
      - dthcrm-db-agentstore:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGENTSTORE_DATASOURCE_USERNAME:-postgres} -d ${AGENTSTORE_DB_NAME:-agentstore}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dthcrm-file-storage:
  dthcrm-heapdumps:
  dthcrm-db-main:
  dthcrm-db-agentstore:
