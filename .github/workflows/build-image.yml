name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (default: branch/sha)'
        required: false

permissions:
  contents: read
  packages: write   # required to push to GHCR

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false   # don't kill an in-flight publish

env:
  REGISTRY: ghcr.io
  # GHCR rejects uppercase in image paths — normalise from github.repository
  # (which preserves the original repo casing, e.g. kl3inIT/dth-crm).
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar (vaadin productionMode)
        # Internal Nexus (com.vn:ai-agent-starter) is sometimes flaky → retry up to 5x
        # with exponential backoff. After the first success Gradle cache is warm so
        # subsequent steps are fast.
        run: |
          chmod +x ./gradlew
          set +e
          for attempt in 1 2 3 4 5; do
            ./gradlew --no-daemon bootJar -Pvaadin.productionMode -x test \
              --refresh-dependencies && exit 0
            echo "::warning::bootJar attempt $attempt failed — retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::error::bootJar failed after 5 attempts — Nexus likely down"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push (Dockerfile.jar uses the JAR built above — decouples Gradle from Docker layers)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.jar
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        run: |
          echo "### 📦 Published images" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
