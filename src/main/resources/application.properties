# ===== server =====
server.port=${DTH_SERVER_PORT:8080}

# ===== spring =====
spring.profiles.active=${DTH_ACTIVE_PROFILE:local}
spring.main.allow-bean-definition-overriding=true
# load local .env if present
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ===== main datasource (Postgres local on 5555) =====
main.datasource.url=${MAIN_DATASOURCE_URL:jdbc:postgresql://localhost:5555/dthcrm}
main.datasource.username=${MAIN_DATASOURCE_USERNAME:postgres}
main.datasource.password=${MAIN_DATASOURCE_PASSWORD:postgres}

# ===== main liquibase (scaffold) =====
main.liquibase.change-log=com/company/crm/liquibase/changelog.xml

# ===== agentstore (Postgres + pgvector local on 5556) — required by ai-agent add-on =====
jmix.core.additional-stores=agentstore
agentstore.datasource.url=${AGENTSTORE_DATASOURCE_URL:jdbc:postgresql://localhost:5556/agentstore}
agentstore.datasource.username=${AGENTSTORE_DATASOURCE_USERNAME:postgres}
agentstore.datasource.password=${AGENTSTORE_DATASOURCE_PASSWORD:postgres}
agentstore.liquibase.change-log=com/vn/agent/liquibase/agentstore-changelog.xml
agentstore.datasource.studio.liquibase.exclude-prefixes=spring_ai_,ai_agent_kb_vector_store

# Schema init flags for add-on managed tables
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
spring.ai.vectorstore.pgvector.initialize-schema=true

# ===== Spring AI via OpenRouter =====
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${OPENROUTER_API_KEY:placeholder-set-in-dotenv}
spring.ai.openai.chat.options.model=${OPENROUTER_MODEL:qwen/qwen3.6-35b-a3b}
spring.ai.openai.embedding.options.model=${OPENROUTER_EMBEDDING_MODEL:qwen/qwen3-embedding-4b}
spring.ai.openai.embedding.options.dimensions=${OPENROUTER_EMBEDDING_DIMENSIONS:2000}
spring.ai.vectorstore.pgvector.table-name=AI_AGENT_KB_VECTOR_STORE
spring.ai.vectorstore.pgvector.dimensions=2000
spring.ai.vectorstore.pgvector.index-type=HNSW

# ===== ai-agent add-on defaults =====
jmix.ai-agent.defaults.model=${OPENROUTER_MODEL:qwen/qwen3.6-35b-a3b}
jmix.ai-agent.defaults.temperature=0.2
jmix.ai-agent.defaults.top-p=1.0
jmix.ai-agent.defaults.max-tokens=1500
jmix.ai-agent.defaults.system-prompt=Bạn là trợ lý của hệ thống DTH CRM. Trả lời bằng tiếng Việt, chỉ dùng dữ liệu CRM mà người dùng được phép truy cập.
jmix.ai-agent.embedding.model=${OPENROUTER_EMBEDDING_MODEL:qwen/qwen3-embedding-4b}
jmix.ai-agent.embedding.dimensions=${OPENROUTER_EMBEDDING_DIMENSIONS:2000}

# multipart caps for KB uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
jmix.ai-agent.rag.upload.max-file-size-bytes=104857600
jmix.ai-agent.rag.upload.file-staging-root=${jmix.core.temp-dir}

# ===== jmix UI =====
jmix.ui.login-view-id=LoginView
jmix.ui.main-view-id=MainView
jmix.ui.menu-config=com/company/crm/menu.xml
jmix.ui.composite-menu=false
jmix.ui.default-view-id=HomeView
jmix.ui.component.checkbox-required-state-initialization-enabled=false
jmix.core.default-file-storage=crm
crm.generateDemoData=true

ui.login.defaultUsername=admin
ui.login.defaultPassword=admin

# tiếng Việt là locale mặc định (đầu danh sách)
jmix.core.available-locales=vi,en

# don't launch browser in dev
vaadin.launch-browser=false

# ===== logging =====
spring.output.ansi.enabled=always
logging.level.eclipselink.logging.sql=info
logging.level.io.jmix.core.datastore=info
logging.level.io.jmix.core.AccessLogger=debug
logging.level.io.jmix=info
logging.level.org.springframework.security=info
logging.level.org.atmosphere=warn
logging.level.org.springframework.ai=INFO
logging.level.com.vn.agent=INFO
