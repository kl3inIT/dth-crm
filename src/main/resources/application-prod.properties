# Production profile overrides — activated via DTH_ACTIVE_PROFILE=prod or
# --spring.profiles.active=prod. Mounted by docker-compose.prod.yml.

# Enable demo data seeding in production too. The generator is idempotent —
# it skips if the clients table is already populated, so existing prod data is safe.
crm.generateDemoData=true

# Larger DB connection pools for production traffic.
main.datasource.hikari.maximum-pool-size=20
main.datasource.hikari.minimum-idle=5
agentstore.datasource.hikari.maximum-pool-size=10
agentstore.datasource.hikari.minimum-idle=2

# Quieter logs.
logging.level.io.jmix=WARN
logging.level.io.jmix.core.AccessLogger=INFO
logging.level.eclipselink.logging.sql=WARN
logging.level.org.springframework.security=WARN

# Vaadin production mode — no dev bundle rebuild on first request.
vaadin.productionMode=true
vaadin.launch-browser=false
